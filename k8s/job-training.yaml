# Manual trigger: kubectl apply -f k8s/job-training.yaml
# To monitor:    kubectl logs -f -n trading -l job-name=training-job
# To cancel:     kubectl delete -f k8s/job-training.yaml
# NOTE: no activeDeadlineSeconds — training takes ~17 days (v4, 2 threads).
apiVersion: batch/v1
kind: Job
metadata:
  name: training-job
  namespace: trading
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: trading
          image: jammane80/trading:latest
          imagePullPolicy: Always
          command:
            - python
            - training_v4.py
            - --output
            - /app/models/training
            - --passes
            - "5"
            - --sigma
            - "0.008"
            - --master-sigma
            - "0.006"
            - --sigma-decay
            - "1.0"
            - --start-day
            - "17"
            - --stop-day
            - "1255"
            - --preserve-stock-data
          resources:
            requests:
              memory: "600Mi"
              cpu: "1500m"
            limits:
              memory: "900Mi"
              cpu: "2000m"
          volumeMounts:
            - name: stock-data
              mountPath: /app/stock_data
            - name: models-training
              mountPath: /app/models/training
      volumes:
        - name: stock-data
          persistentVolumeClaim:
            claimName: pvc-stock-data
        - name: models-training
          persistentVolumeClaim:
            claimName: pvc-models-training
